name: AEM CI Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: Build, Test & Package All Modules
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 11

      - name: Cache Maven Repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Maven Clean Install (Build All Modules)
        run: mvn clean install --batch-mode --update-snapshots

      - name: Generate Surefire HTML Report
        run: mvn surefire-report:report-only

      - name: Copy Surefire Reports to Directory
        run: |
          mkdir -p report-html
          cp -r core/target/reports/* report-html/
          cp report-html/surefire.html report-html/index.html

      - name: Upload HTML Report as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: surefire-html-report
          path: ./report-html
          retention-days: 2
