<sly data-sly-use.placeholderTemplate="core/wcm/components/commons/v1/templates.html" />
<div class="cta-main">
    <sly data-sly-use.model="com.shell.core.models.CTACard"/>
    <div class="cta-cards">
        <div class="circle" data-sly-test="${!model.empty}">
            <img src="${model.iconReference}">
        </div>
        <h3 class="ctacard-title">${model.title}</h3>
    </div>
</div>
<sly data-sly-call="${placeholderTemplate.placeholder @ isEmpty=model.empty}" />
