
<sly data-sly-use.model="com.shell.core.models.CardFilter" 
     data-sly-use.placeholderTemplate="core/wcm/components/commons/v1/templates.html"
     />

<div class="filter-container" >
    <div class="filter-title">
       <sly data-sly-resource="${'title1' @ resourceType='/apps/shell/components/title'}"></sly>
    </div>

    <div class="cf-list" data-sly-test="${!model.empty}"
     data-parent-path="${model.parentPath}"
     data-model-path="${model.modelPath}">

            <!-- Filter -->
        <div class="cf-filters">
            <label for="filter-subtitle">Product</label>
            <select id="filter-subtitle">
            <option value="">All Subtitles</option>
            </select>
        </div>

  <div id="cf-container"></div>

    <!-- Popup Overlay -->
    <div id="cf-popup" class="cf-popup">
        <div class="cf-popup-content">
            <span class="close-popup"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" class="block h-full w-full"><polygon fill="#595959" points="19.293 3.293 20.707 4.707 13.414 12 20.707 19.293 19.293 20.707 12 13.414 4.707 20.707 3.293 19.293 10.586 12 3.293 4.707 4.707 3.293 12 10.586"></polygon></svg></span>
            <div class="popup-img">
                <img src="" alt="">
                <div class="bottom-tile">
                    <h3 class="popup-tilename"></h3>
                    <p class="popup-subtitle"></p>
                </div>
            </div>
            <div class="popup-text">
                <h2 class="popup-title"></h2>
                <p class="popup-description"></p>
                <div class="popup-links"></div>
            </div>
        </div>
    </div>
</div>
<hr>

<!-- Placeholder support -->
<sly data-sly-call="${placeholderTemplate.placeholder @ isEmpty=model.empty, classAppend='cf-placeholder'}" />
