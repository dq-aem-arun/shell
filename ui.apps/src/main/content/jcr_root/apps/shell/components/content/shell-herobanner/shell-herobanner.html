<sly data-sly-use.model="com.shell.core.models.HeroBanner">
    <sly  data-sly-use.placeholderTemplate="core/wcm/components/commons/v1/templates.html"
          data-sly-test.hasContent="${!model.empty}"/>
    <section class="section-main">
        <div class="cmp_hero-banner ${cq.styleClasses}">
            <div> <img src="${model.fileReference}" alt="Upload the Image" class="cmp_hero-banner_img"/></div>
            <div class="cmp_hero-banner_text">
                <h1 class="cmp-herobanner-title">${model.title}</h1>
                <div class="cmp_hero-banner_para">${model.description @context='html'}</div>
                <div class="cmp_hero-banner_button"
                        data-sly-resource="${'shellbutton' @ resourceType='shell/components/content/shell-button', decorationTagName='div'}">
                </div>
            </div>
        </div>
    </section>
</sly>
<sly
        data-sly-call="${placeholderTemplate.placeholder @ isEmpty=!hasContent}">
</sly>
