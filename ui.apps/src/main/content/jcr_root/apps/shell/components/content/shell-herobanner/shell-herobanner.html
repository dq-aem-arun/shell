<sly data-sly-use.model="com.shell.core.models.HeroBanner">
  <div class="cmp_hero-banner">
    <div class="cmp_hero-banner-img" style="background-image: url(${model.image @ context='styleString'});"> </div>
    <div class="cmp_hero-banner_text">
      <h1 class="cmp-herobanner-title">${model.title}</h1>
      <p class="cmp_hero-banner_para">${model.details}</p>
      <button class="cmp_hero-banner_button">Download the app now</button>
    </div>
  </div>
</sly>
