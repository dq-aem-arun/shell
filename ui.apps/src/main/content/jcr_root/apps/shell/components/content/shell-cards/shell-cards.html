<sly data-sly-use.model="com.shell.core.models.Cards" />
<sly data-sly-use.placeholderTemplate="core/wcm/components/commons/v1/templates.html" />

<section class="shell-card-section" data-sly-test="${!model.empty}">
    <sly data-sly-list.card="${model.cards}">
        <div class="shell-card ${style.cssClass}" data-card-link="${card.cardLink}">
            <img src="${card.fileReference}" alt="${card.title}" class="card-image" />

            <div class="card-content">
                <h3 class="card-title" data-sly-test="${card.title}">${card.title @ context='html'}</h3>
                <p class="card-description" data-sly-test="${card.description}">${card.description @ context='html'}</p>

                <div class="card-button" data-sly-test="${card.showButton}">
                    <sly data-sly-resource="${'btn' @ resourceType='shell/components/content/shell-button', decorationTagName='div'}" />
                </div>
            </div>
        </div>
    </sly>
</section>

<!-- Placeholder support -->
<sly data-sly-call="${placeholderTemplate.placeholder @ isEmpty=model.empty}" />
